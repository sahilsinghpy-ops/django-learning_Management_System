{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="{% static 'courses/css/dashboard.css' %}">
</head>
<body>

    <div class="navbar">
    <h1>Student Dashboard</h1>
    <div style="display:flex; gap:15px; align-items:center">
        <div style="display:flex; align-items:center; gap:8px; background:rgba(255,255,255,0.2); padding:8px 15px; border-radius:20px;">
            <div style="width:32px; height:32px; border-radius:50%; background:white; display:flex; align-items:center; justify-content:center;">
                <span id="navIcon" style="color:#4a90e2; font-weight:700; font-size:14px;"></span>
            </div>
            <span id="navUsername" style="color:white; font-weight:600; font-size:14px;"></span>
        </div>
        <button onclick="window.location.href='/courses/all/'">Browse Courses</button>
        <button onclick="logout()">Logout</button>
    </div>
</div>
    <div class="container">
        <p class="section-title">My Enrolled Courses</p>
        <div class="courses-grid" id="enrolledGrid">
            <p style="color:#999">Loading...</p>
        </div>
    </div>

    <!-- Review Modal -->
    <div class="modal-overlay" id="reviewModal">
        <div class="modal">
            <h3>Add Review</h3>
            <input type="hidden" id="selectedCourseId">
            <div class="error" id="reviewError"></div>
            <div class="form-group">
                <label>Rating (1-5)</label>
                <select id="rating">
                    <option value="5">⭐⭐⭐⭐⭐ - Excellent</option>
                    <option value="4">⭐⭐⭐⭐ - Good</option>
                    <option value="3">⭐⭐⭐ - Average</option>
                    <option value="2">⭐⭐ - Poor</option>
                    <option value="1">⭐ - Terrible</option>
                </select>
            </div>
            <div class="form-group">
                <label>Comment</label>
                <textarea id="comment" placeholder="Write your review..."></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn btn-primary" onclick="submitReview()">Submit</button>
                <button class="btn btn-secondary" onclick="closeReviewModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="{% static 'courses/js/student.js' %}"></script>
</body>
</html>
